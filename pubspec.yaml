name: beauty_app
description: "钥纪 - 发现属于你的美，智能美妆穿搭助手"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.1

  # 路由
  go_router: ^13.0.0

  # 相机 & 相册
  image_picker: ^1.0.4

  # 本地存储
  shared_preferences: ^2.2.2

  # 动画
  flutter_animate: ^4.5.0

  # 网络请求
  http: ^1.1.0

  # 图片缓存
  cached_network_image: ^3.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
